<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gesture Universe Explorer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- LOADER -->
    <div id="loader">
      <div id="loader-title">GESTURE UNIVERSE EXPLORER</div>
      <div id="loader-bar"><div id="loader-fill"></div></div>
      <div id="loader-text">INITIALIZING SYSTEMS...</div>
    </div>

    <!-- FOCUS FLASH -->
    <div id="focus-flash"></div>

    <!-- TOP BAR -->
    <div id="topbar">
      <div id="logo">GESTURE <span>UNIVERSE</span> EXPLORER</div>
      <div id="system-time"></div>
      <div id="hand-status" class="searching">◌ SEARCHING HAND</div>
    </div>

    <!-- INFO PANEL -->
    <div id="info-panel">
      <div id="planet-index">OBJECT 01 / 09</div>
      <div id="planet-name">SUN</div>
      <div id="planet-subtitle">The Star</div>
      <div class="stat-row"><span class="stat-label">Diameter</span><span class="stat-value" id="stat-diameter">—</span></div>
      <div class="stat-row"><span class="stat-label">Distance</span><span class="stat-value" id="stat-distance">—</span></div>
      <div class="stat-row"><span class="stat-label">Orbital Period</span><span class="stat-value" id="stat-period">—</span></div>
      <div class="stat-row"><span class="stat-label">Surface Temp</span><span class="stat-value" id="stat-temp">—</span></div>
      <div id="planet-desc"></div>
      <div id="planet-type-badge"></div>
    </div>

    <!-- GESTURE GUIDE -->
    <div id="gesture-guide">
      <div class="gesture-item"><span class="gesture-icon">👋</span><span class="gesture-text">Swipe → Navigate</span></div>
      <div class="gesture-item"><span class="gesture-icon">🤏</span><span class="gesture-text">Pinch → Zoom</span></div>
      <div class="gesture-item"><span class="gesture-icon">✊</span><span class="gesture-text">Hold → Detail</span></div>
      <div class="gesture-item"><span class="gesture-icon">✋</span><span class="gesture-text">Open → Exit</span></div>
    </div>

    <!-- CAMERA FEED -->
    <video id="input_video" style="display: none" playsinline></video>
    <div id="video-container"><canvas id="output_canvas"></canvas></div>

    <!-- NAV DOTS -->
    <div id="nav-dots"></div>

    <!-- ORBIT RING -->
    <div id="orbit-ring"><div id="orbit-fill" style="height: 11%"></div></div>

    <!-- MediaPipe (CDN; npm packages are tricky with Vite due to globals) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
